services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vokhanhbel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vokhanhbel"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - vokhanhbel-postgres-data-v1:/var/lib/postgresql/data

volumes:
  vokhanhbel-postgres-data-v1:
