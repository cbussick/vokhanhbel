<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards — Design Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Design tokens (docs/spec.md → Design Tokens)
   ============================================================ */
:root {
  --color-primary: #ADD8E6;
  --color-primary-text: #1D3A4A;
  --color-success: #2FBF71;
  --color-warning: #FFB020;
  --color-danger: #D53250;
  --color-bg: #F4FAFD;
  --color-surface: #FFFFFF;
  --color-text: #243642;
  --color-text-secondary: #586B76;

  --font-body: 15px;
  --font-button: 17px;
  --font-title: 22px;
  --font-display: "Baloo 2", "Be Vietnam Pro", -apple-system, sans-serif;
  --font-ui: "Be Vietnam Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  --radius: 16px;
  --radius-card: 24px;
  --gutter: 16px;

  --shadow-soft: 0 8px 24px rgba(36, 54, 66, 0.10);
  --shadow-sheet: 0 -8px 32px rgba(36, 54, 66, 0.16);

  --ease-overshoot: cubic-bezier(0.35, 1.4, 0.4, 1);
  --tabbar-height: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

[hidden] { display: none !important; }

html, body {
  height: 100%;
  background: #E4EEF4; /* page backdrop behind the phone column on desktop */
}

body {
  font-family: var(--font-ui);
  font-size: var(--font-body);
  color: var(--color-text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

h1, h2, .sheet-title { font-family: var(--font-display); font-weight: 700; }

/* ============================================================
   Icons (inline SVG sprite) + mascot
   ============================================================ */
.icon { width: 24px; height: 24px; flex-shrink: 0; }
.icon-sm { width: 17px; height: 17px; }
.mascot { width: 76px; height: 76px; }
.mascot-sm { width: 30px; height: 30px; }

button {
  font-family: inherit;
  font-size: var(--font-button);
  border: none;
  cursor: pointer;
  min-height: 44px; /* min touch target */
  border-radius: var(--radius);
  background: none;
  color: inherit;
}

input, textarea {
  font-family: inherit;
  font-size: var(--font-body);
  color: var(--color-text);
}

.visually-hidden {
  position: absolute; width: 1px; height: 1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;
}

/* ============================================================
   Screen column: mobile-first, centered 480px column on >=768px
   ============================================================ */
.screen {
  position: fixed;
  inset: 0;
  margin: 0 auto;
  width: 100%;
  background: var(--color-bg);
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.screen.active { display: flex; }

@media (min-width: 768px) {
  .screen { max-width: 480px; box-shadow: 0 0 40px rgba(36,54,66,.12); }
}

/* ============================================================
   Buttons
   ============================================================ */
.btn { font-weight: 600; padding: 0 20px; transition: transform 120ms ease, filter 120ms ease; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--color-primary); color: var(--color-primary-text); }
.btn-secondary { background: var(--color-surface); color: var(--color-primary-text); border: 2px solid var(--color-primary); }
.btn-danger-outline { background: var(--color-surface); color: var(--color-danger); border: 2px solid var(--color-danger); }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-block { display: block; width: 100%; }
.btn:disabled { opacity: 0.45; cursor: default; }

/* ============================================================
   Login
   ============================================================ */
#screenLogin {
  justify-content: center;
  align-items: center;
  padding: var(--gutter);
}
.login-card {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-soft);
  padding: 32px 24px;
  width: 100%;
  max-width: 340px;
  text-align: center;
}
.login-card h1 { font-size: 26px; margin: 10px 0 22px; }
.login-card input {
  width: 100%;
  padding: 12px 16px;
  min-height: 44px;
  border: 2px solid #D6E6EE;
  border-radius: var(--radius);
  margin-bottom: 8px;
  font-size: var(--font-button);
}
.login-card input:focus { outline: none; border-color: var(--color-primary); }
.login-error {
  color: var(--color-danger);
  min-height: 20px;
  margin-bottom: 8px;
  font-size: 13px;
}
.shake { animation: shake 200ms ease-in-out; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.scale-in { animation: scaleIn 300ms var(--ease-overshoot); }
@keyframes scaleIn {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ============================================================
   App shell: header, views, bottom tab bar
   ============================================================ */
#appShell main {
  flex: 1;
  overflow-y: auto;
  padding: var(--gutter);
  padding-bottom: calc(var(--tabbar-height) + 24px);
}
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 20px var(--gutter) 4px;
}
.app-header h1 { font-size: var(--font-title); }
.points-pill {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--color-primary-text);
  background: var(--color-primary);
  border-radius: 999px;
  padding: 4px 14px 4px 10px;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity 150ms ease;
}
.points-pill .icon { width: 16px; height: 16px; color: var(--color-primary-text); }
.points-pill.pulse { animation: pointsPulse 350ms var(--ease-overshoot); }
@keyframes pointsPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.18); }
  100% { transform: scale(1); }
}

.tabbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: var(--tabbar-height);
  background: var(--color-surface);
  border-top: 1px solid #E3EEF3;
  display: flex;
  z-index: 20;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--color-text-secondary);
  font-size: 12px;
  border-radius: 0;
  position: relative;
}
.tab .tab-icon { display: inline-flex; }
.tab .tab-icon .icon { width: 23px; height: 23px; }
.tab.active { color: var(--color-primary-text); }
.tab.active .tab-icon .icon { stroke-width: 2.6; }
.tab.active .tab-icon { animation: none; }
.tab.active .tab-icon.bounce { animation: tabBounce 250ms var(--ease-overshoot); }
@keyframes tabBounce {
  0% { transform: scale(1); }
  40% { transform: scale(1.14) translateY(-2px); }
  100% { transform: scale(1); }
}
.tab-badge {
  position: absolute;
  top: 8px;
  left: calc(50% + 8px);
  background: var(--color-warning);
  color: #4A3200;
  font-size: 11px;
  font-weight: 700;
  border-radius: 999px;
  min-width: 18px;
  height: 18px;
  line-height: 18px;
  padding: 0 4px;
  text-align: center;
}

/* ============================================================
   Review tab
   ============================================================ */
.hero-card {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-soft);
  padding: 32px 24px;
  text-align: center;
  margin-top: 12px;
}
.hero-card h2 { font-size: 21px; margin: 10px 0 4px; }
.hero-card p { color: var(--color-text-secondary); margin-bottom: 20px; }
.hero-card .btn { min-height: 52px; }
.hero-card .btn + .btn { margin-top: 10px; }
.last-session {
  text-align: center;
  color: var(--color-text-secondary);
  font-size: 13px;
  margin-top: 16px;
}

/* ============================================================
   Cards tab
   ============================================================ */
.search-row { margin: 8px 0 4px; }
.search-row input {
  width: 100%;
  min-height: 44px;
  padding: 10px 16px;
  border: 2px solid #D6E6EE;
  border-radius: var(--radius);
  background: var(--color-surface);
}
.search-row input:focus { outline: none; border-color: var(--color-primary); }
.cards-count { color: var(--color-text-secondary); font-size: 13px; margin: 8px 2px 12px; }
.card-row {
  width: 100%;
  text-align: left;
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 4px rgba(36,54,66,.06);
}
.card-row .row-text { flex: 1; min-width: 0; }
.card-row .row-front { font-weight: 700; font-size: 15px; }
.card-row .row-back {
  color: var(--color-text-secondary);
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chip {
  font-size: 12px;
  font-weight: 700;
  border-radius: 999px;
  padding: 3px 10px;
  flex-shrink: 0;
}
.chip-new { background: var(--color-primary); color: var(--color-primary-text); }
.chip-due { background: var(--color-warning); color: #4A3200; }
.chip-sched { background: #E2EAEF; color: var(--color-text-secondary); }

.fab {
  position: absolute;
  right: var(--gutter);
  bottom: calc(var(--tabbar-height) + 16px);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-primary);
  color: var(--color-primary-text);
  font-size: 28px;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
  z-index: 21;
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--color-text-secondary);
}
.empty-state p { margin: 12px 0 16px; }

/* ============================================================
   Me tab
   ============================================================ */
.me-points {
  text-align: center;
  padding: 32px 0 8px;
  font-family: var(--font-display);
  font-size: 46px;
  font-weight: 800;
  color: var(--color-primary-text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.me-points .star { display: inline-flex; color: var(--color-warning); }
.me-points .star .icon { width: 36px; height: 36px; }
.me-points .star.pulse { animation: starPulse 600ms var(--ease-overshoot); }
@keyframes starPulse {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.35) rotate(12deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.me-points-label { text-align: center; color: var(--color-text-secondary); margin-bottom: 24px; }
.stats-list {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: 0 1px 4px rgba(36,54,66,.06);
  overflow: hidden;
}
.stats-list .stat-row {
  display: flex;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #EEF5F8;
}
.stats-list .stat-row:last-child { border-bottom: none; }
.stat-row .stat-value { font-weight: 700; }
.logout-row { margin-top: 32px; }

/* ============================================================
   Review session (fullscreen, tab bar hidden)
   ============================================================ */
#screenSession { background: var(--color-bg); }
.session-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px var(--gutter) 8px;
}
.session-close { font-size: 22px; width: 44px; color: var(--color-text-secondary); flex-shrink: 0; }
.progress-wrap { flex: 1; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-bottom: 4px; }
.progress-track { height: 6px; background: #DCE9F0; border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: 3px;
  width: 0%;
  transition: width 300ms ease;
}

.session-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px var(--gutter) var(--gutter);
  overflow: hidden;
}
.card-area {
  flex: 1;
  display: flex;
  align-items: stretch;
  perspective: 1200px;
  min-height: 0;
  padding: 8px 0;
}

.flashcard {
  width: 100%;
  position: relative;
  transform-style: preserve-3d;
}
.flashcard-inner {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transition: transform 400ms var(--ease-overshoot); /* flip: 3D Y-rotation, overshoot */
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  background: var(--color-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-soft);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}
.card-face.back { transform: rotateY(180deg); }
.card-face.back .card-content { user-select: text; } /* copyable answers */
.card-content {
  text-align: center;
  font-family: var(--font-display);
  font-weight: 600;
  max-height: 100%;
  width: 100%;
}
/* index-card rule under the word */
.card-content::after {
  content: "";
  display: block;
  width: 44px;
  height: 4px;
  border-radius: 2px;
  background: var(--color-primary);
  margin: 18px auto 0;
}
.card-content.scrollable {
  overflow-y: auto;
  mask-image: linear-gradient(to bottom, black 82%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 82%, transparent 100%);
}
.mini-front {
  position: absolute;
  top: 16px;
  left: 24px;
  right: 24px;
  text-align: center;
  font-size: 13px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* card slides in from the right */
.slide-in-right { animation: slideInRight 320ms var(--ease-overshoot); }
@keyframes slideInRight {
  from { transform: translateX(110%) scale(0.97); opacity: 0.6; }
  to { transform: translateX(0) scale(1); opacity: 1; }
}

/* grade fly-offs (spec animation table) */
.fly-knew { animation: flyKnew 600ms ease-in forwards; }
@keyframes flyKnew {
  0% { transform: translateX(0) rotate(0); box-shadow: 0 0 0 0 rgba(47,191,113,0.6); }
  35% { box-shadow: 0 0 0 14px rgba(47,191,113,0); }
  100% { transform: translateX(130%) rotate(8deg); opacity: 0; }
}
.fly-almost { animation: flyAlmost 500ms ease-in forwards; }
@keyframes flyAlmost {
  0% { transform: translateX(0) rotate(0) scale(1); box-shadow: 0 0 0 0 rgba(255,176,32,0.55); }
  35% { box-shadow: 0 0 0 12px rgba(255,176,32,0); }
  100% { transform: translateX(120%) rotate(5deg) scale(0.97); opacity: 0; }
}
.fly-forgot { animation: flyForgot 500ms ease-out forwards; } /* gentle, no shake/red */
@keyframes flyForgot {
  0% { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
  100% { transform: translateX(-115%) rotate(-5deg) scale(0.97); opacity: 0; filter: saturate(0.6); }
}
.fly-knew .card-face, .fly-almost .card-face, .fly-forgot .card-face { box-shadow: none; }
.fly-knew, .fly-almost, .fly-forgot { border-radius: var(--radius-card); }

.session-controls { flex-shrink: 0; padding-top: 8px; }
.ask-ai-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin: 0 auto 8px;
  color: var(--color-primary-text);
  font-size: 14px;
  font-weight: 600;
  min-height: 44px;
}
.ask-ai-btn .icon { width: 16px; height: 16px; color: var(--color-warning); }
.grade-row { display: flex; gap: 8px; }
.grade-row .btn { flex: 1; min-height: 56px; padding: 0 4px; font-size: 15px; }
.btn-forgot { background: #E7EDF1; color: var(--color-text); }
.btn-almost { background: var(--color-warning); color: #4A3200; }
.btn-knew { background: var(--color-success); color: var(--color-text); }
.slide-up { animation: slideUp 250ms ease-out; }
@keyframes slideUp {
  from { transform: translateY(80px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.show-answer-btn { min-height: 56px; }

.next-review-flash {
  position: absolute;
  left: 0; right: 0;
  bottom: 130px;
  text-align: center;
  font-weight: 700;
  color: var(--color-primary-text);
  opacity: 0;
  pointer-events: none;
}
.next-review-flash.show { animation: flashFade 800ms ease; }
@keyframes flashFade {
  0% { opacity: 0; transform: translateY(6px); }
  25% { opacity: 1; transform: translateY(0); }
  75% { opacity: 1; }
  100% { opacity: 0; }
}

/* ============================================================
   Session summary
   ============================================================ */
.summary-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 0 var(--gutter) var(--gutter);
}
.summary-wrap h2 { font-size: 26px; margin-bottom: 20px; }
.summary-breakdown {
  background: var(--color-surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  padding: 16px;
  margin-bottom: 16px;
}
.summary-breakdown .stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 8px;
}
.grade-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 9px;
  vertical-align: baseline;
}
.summary-points {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 800;
  color: var(--color-primary-text);
  margin-bottom: 24px;
  position: relative;
}
.summary-wrap .btn + .btn { margin-top: 10px; }
.star-particle {
  position: absolute;
  left: 50%; top: 50%;
  font-size: 18px;
  pointer-events: none;
  animation: starBurst 700ms ease-out forwards;
}
@keyframes starBurst {
  from { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
  to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.2); opacity: 0; }
}

/* ============================================================
   Bottom sheets (native <dialog>)
   ============================================================ */
dialog.sheet {
  position: fixed;
  margin: auto auto 0;
  width: 100%;
  max-width: 480px;
  border: none;
  border-radius: var(--radius-card) var(--radius-card) 0 0;
  background: var(--color-surface);
  box-shadow: var(--shadow-sheet);
  padding: 0;
  max-height: 90dvh;
  color: var(--color-text);
}
dialog.sheet::backdrop { background: rgba(36, 54, 66, 0.45); }
dialog.sheet[open] { animation: sheetUp 320ms var(--ease-overshoot); }
@keyframes sheetUp {
  from { transform: translateY(60%); opacity: 0.5; }
  to { transform: translateY(0); opacity: 1; }
}
.sheet-handle-row {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 0 2px;
  touch-action: none;
  cursor: grab;
}
.sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: #D3E0E8; }
.sheet-close {
  position: absolute;
  top: 6px; right: 8px;
  width: 44px;
  font-size: 20px;
  color: var(--color-text-secondary);
}
.sheet-body { padding: 8px var(--gutter) calc(var(--gutter) + 12px); overflow-y: auto; }
.sheet-title { font-size: var(--font-title); margin-bottom: 16px; }

/* Card detail sheet */
.detail-face { margin-bottom: 12px; }
.detail-label { font-size: 12px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
.detail-text { font-size: 18px; font-weight: 600; margin-top: 4px; user-select: text; }
.detail-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.inline-confirm { display: flex; gap: 10px; align-items: center; }
.inline-confirm span { flex: 1; font-weight: 600; }
.inline-confirm .btn { padding: 0 16px; min-height: 44px; }

/* Card editor sheet */
dialog.sheet.tall { height: 90dvh; display: flex; flex-direction: column; }
dialog.sheet.tall:not([open]) { display: none; }
dialog.sheet.tall .sheet-body { flex: 1; display: flex; flex-direction: column; }
.editor-field { display: flex; flex-direction: column; margin-bottom: 14px; flex: 1; }
.editor-field label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.editor-field textarea {
  flex: 1;
  min-height: 88px;
  resize: none;
  border: 2px solid #D6E6EE;
  border-radius: var(--radius);
  padding: 12px;
}
.editor-field textarea:focus { outline: none; border-color: var(--color-primary); }
.editor-actions { display: flex; gap: 10px; }
.editor-actions .btn { flex: 1; }
.editor-delete { margin-top: 12px; }

/* AI chat sheet */
dialog.sheet.chat { height: 85dvh; display: flex; flex-direction: column; }
dialog.sheet.chat:not([open]) { display: none; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 4px var(--gutter);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bubble {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: var(--radius);
  line-height: 1.45;
  user-select: text;
}
.bubble.assistant { background: #EAF4F9; align-self: flex-start; border-bottom-left-radius: 4px; }
.bubble.user { background: var(--color-primary); color: var(--color-primary-text); align-self: flex-end; border-bottom-right-radius: 4px; }
.bubble.error { background: #FDE8EC; color: var(--color-danger); }
.typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--color-text-secondary);
  animation: typingBlink 1s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingBlink { 0%, 60%, 100% { opacity: 0.25; } 30% { opacity: 1; } }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px var(--gutter) 8px; }
.suggestion-chip {
  border: 2px solid var(--color-primary);
  color: var(--color-primary-text);
  background: var(--color-surface);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  padding: 0 14px;
  min-height: 40px;
}
.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 8px var(--gutter) calc(var(--gutter));
  border-top: 1px solid #EEF5F8;
}
.chat-input-row input {
  flex: 1;
  min-height: 44px;
  border: 2px solid #D6E6EE;
  border-radius: 999px;
  padding: 0 16px;
}
.chat-input-row input:focus { outline: none; border-color: var(--color-primary); }
.chat-send {
  width: 44px;
  border-radius: 50%;
  background: var(--color-primary);
  color: var(--color-primary-text);
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.chat-send .icon { width: 19px; height: 19px; }
.chat-title {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 16px 8px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
}

/* ============================================================
   Toast / points chip / confetti overlays
   ============================================================ */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--color-text);
  color: #fff;
  border-radius: 999px;
  padding: 10px 12px 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease, transform 200ms ease;
  z-index: 100;
  font-size: 14px;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
#toast button {
  color: var(--color-primary);
  font-weight: 700;
  font-size: 14px;
  min-height: 32px;
  padding: 0 8px;
}

.points-chip {
  position: fixed;
  left: 0; top: 0;
  background: var(--color-success);
  color: #fff;
  font-weight: 800;
  font-size: 15px;
  border-radius: 999px;
  padding: 5px 12px;
  pointer-events: none;
  z-index: 110;
  will-change: transform;
}

#confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 105; overflow: hidden; }
.confetti-piece {
  position: absolute;
  width: 9px; height: 14px;
  top: -20px;
  animation: confettiFall var(--dur) ease-in forwards;
}
@keyframes confettiFall {
  from { transform: translateY(0) rotate(0deg); opacity: 1; }
  to { transform: translateY(105vh) rotate(var(--spin)); opacity: 0.8; }
}

/* ============================================================
   Hover states (pointer devices only, so touch doesn't get a
   stuck hover after tapping)
   ============================================================ */
@media (hover: hover) {
  .btn:hover { filter: brightness(0.96); }
  .btn:disabled:hover { filter: none; }
  .card-row:hover { box-shadow: 0 2px 10px rgba(36,54,66,.12); }
  .tab:hover { color: var(--color-primary-text); }
  .fab:hover { filter: brightness(0.96); }
  .chat-send:hover, .suggestion-chip:hover { filter: brightness(0.96); }
}

/* ============================================================
   Reduced motion: flips become crossfades; confetti/arcs are
   replaced by instant state changes (also gated in JS)
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .flashcard-inner { transition: none; }
  .flashcard .card-face { transition: opacity 0.01ms; }
  .flashcard .card-face.back { transform: none; opacity: 0; pointer-events: none; }
  .flashcard.flipped .flashcard-inner { transform: none; }
  .flashcard.flipped .card-face.front { opacity: 0; pointer-events: none; }
  .flashcard.flipped .card-face.back { opacity: 1; pointer-events: auto; }
}

<script>
"use strict";

/* ============================================================
   Helpers
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const dayMs = 24 * 60 * 60 * 1000;
const now = () => Date.now();
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

function announce(text) {
  $("#ariaLive").textContent = "";
  requestAnimationFrame(() => { $("#ariaLive").textContent = text; });
}

function relShort(ts) {
  const diff = ts - now();
  if (diff < dayMs) return Math.max(1, Math.round(diff / 3600000)) + "h";
  return Math.round(diff / dayMs) + "d";
}

/* ============================================================
   Scheduling + points constants (docs/spec.md)
   ============================================================ */
const boxIntervalsDays = [1, 3, 7, 14, 30, 90];
const maxBox = 5;
const pointsByGrade = { forgot: 1, almost: 5, knew_it: 10 };
const gradeLabels = { forgot: "Forgot", almost: "Almost", knew_it: "Knew it" };

function calculateNextBox(currentBox, grade) {
  if (grade === "forgot") return 0;
  if (grade === "knew_it") return Math.min(currentBox + 1, maxBox);
  return currentBox;
}

/* ============================================================
   Mock data
   ============================================================ */
let cardSeq = 0;
function makeCard(front, back, box, dueOffsetDays, reviewedDaysAgo) {
  return {
    id: "c" + (++cardSeq),
    front, back, box,
    dueAt: now() + dueOffsetDays * dayMs,
    lastReviewedAt: reviewedDaysAgo == null ? null : now() - reviewedDaysAgo * dayMs,
  };
}

const state = {
  loggedIn: false,
  points: 240,
  activeTab: "review",
  lastSession: { reviewed: 10, knew: 8 },
  reviewsThisWeek: 23,
  bestDay: "Tue, Jul 8",
  cards: [
    makeCard("cat", "die Katze", 1, -0.2, 3),
    makeCard("dog", "der Hund", 0, -0.5, 1),
    makeCard("water", "das Wasser", 2, -0.1, 7),
    makeCard("bread", "das Brot", 1, -1.2, 4),
    makeCard("milk", "die Milch", 0, -0.3, 1),
    makeCard("apple", "der Apfel", 3, -0.8, 14),
    makeCard("house", "das Haus", 1, -2, 5),
    makeCard("sun", "die Sonne", 2, -0.6, 7),
    makeCard("good morning", "Guten Morgen", 0, -0.1, null),
    makeCard("thank you very much", "Danke schön", 0, -0.1, null),
    makeCard("flower", "bông hoa", 0, -0.05, null),
    makeCard(
      "Spring is my favorite season, because the flowers bloom and the sun shines longer again.",
      "Der Frühling ist meine Lieblingsjahreszeit, weil die Blumen blühen und die Sonne wieder länger scheint.",
      0, -0.05, null
    ),
    makeCard("book", "quyển sách", 1, 3, 2),
    makeCard("love", "die Liebe", 2, 7, 3),
    makeCard("how are you?", "Bạn khỏe không?", 3, 26, 4),
  ],
};

const dueCards = () => state.cards.filter((c) => c.dueAt <= now());

function cardStatus(c) {
  if (!c.lastReviewedAt) return { label: "New", cls: "chip-new" };
  if (c.dueAt <= now()) return { label: "Due", cls: "chip-due" };
  return { label: "In " + relShort(c.dueAt), cls: "chip-sched" };
}

/* ============================================================
   Points displays
   ============================================================ */
function renderPoints(pulse) {
  for (const el of [$("#shellPoints"), $("#sessionPoints")]) {
    el.querySelector(".points-value").textContent = state.points;
    if (pulse && !reducedMotion.matches) {
      el.classList.remove("pulse");
      void el.offsetWidth;
      el.classList.add("pulse");
    }
  }
}

function countUpPoints(from, to) {
  if (reducedMotion.matches) { renderPoints(false); return; }
  const start = performance.now();
  const dur = 400;
  function tick(t) {
    const p = Math.min(1, (t - start) / dur);
    const val = Math.round(from + (to - from) * p);
    $("#shellPoints .points-value").textContent = val;
    $("#sessionPoints .points-value").textContent = val;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  renderPointsPulseOnly();
}
function renderPointsPulseOnly() {
  for (const el of [$("#shellPoints"), $("#sessionPoints")]) {
    el.classList.remove("pulse");
    void el.offsetWidth;
    el.classList.add("pulse");
  }
}

/* ============================================================
   Router (#/login, #/review, #/review/session, #/cards,
   #/cards/:id, #/me)
   ============================================================ */
function navigate(hash) { location.hash = hash; }

function route() {
  const hash = location.hash || "#/login";
  if (!state.loggedIn && hash !== "#/login") { location.replace("#/login"); return; }
  if (state.loggedIn && hash === "#/login") { navigate("#/review"); return; }

  closeAllSheets();
  const [, seg1, seg2] = hash.slice(1).split("/"); // "", seg1, seg2

  if (seg1 === "login" || !seg1) return showScreen("screenLogin");

  if (seg1 === "review" && seg2 === "session") {
    if (!session.queue.length) startSession(defaultQueue());
    if (!session.queue.length) { navigate("#/review"); return; }
    showScreen("screenSession");
    renderSession(false);
    return;
  }
  if (seg1 === "review") { session.queue = []; showTab("review"); return; }
  if (seg1 === "cards" && seg2) {
    showTab("cards");
    const card = state.cards.find((c) => c.id === seg2);
    if (card) openDetail(card); else navigate("#/cards");
    return;
  }
  if (seg1 === "cards") { showTab("cards"); return; }
  if (seg1 === "me") { showTab("me"); return; }
  navigate("#/review");
}

function showScreen(id) {
  for (const s of document.querySelectorAll(".screen")) s.classList.toggle("active", s.id === id);
}

function showTab(tab) {
  const prev = state.activeTab;
  state.activeTab = tab;
  showScreen("appShell");
  for (const t of document.querySelectorAll(".tab")) {
    const active = t.dataset.tab === tab;
    t.classList.toggle("active", active);
    if (active && prev !== tab && !reducedMotion.matches) {
      const icon = t.querySelector(".tab-icon");
      icon.classList.remove("bounce");
      void icon.offsetWidth;
      icon.classList.add("bounce");
    }
  }
  $("#fabAdd").hidden = tab !== "cards";
  if (tab === "review") renderReviewTab();
  if (tab === "cards") renderCardsTab();
  if (tab === "me") renderMeTab();
  renderDueBadge();
}

function renderDueBadge() {
  const n = dueCards().length;
  const badge = $("#dueBadge");
  badge.hidden = n === 0;
  badge.textContent = n;
}

/* ============================================================
   Review tab
   ============================================================ */
function renderReviewTab() {
  $("#shellTitle").textContent = "Hi Khanh";
  renderPoints(false);
  const due = dueCards();
  const main = $("#shellMain");
  const last = state.lastSession;
  const lastLine = last
    ? `<div class="last-session">Yesterday: ${last.reviewed} reviewed · ${last.knew} knew it</div>` : "";

  if (state.cards.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <svg class="mascot"><use href="#i-chick"/></svg>
        <p>Add some cards first, then come back to review</p>
        <button class="btn btn-primary" onclick="navigate('#/cards')">Go to Cards</button>
      </div>`;
    return;
  }

  if (due.length === 0) {
    const next = [...state.cards].sort((a, b) => a.dueAt - b.dueAt)[0];
    main.innerHTML = `
      <div class="hero-card">
        <svg class="mascot"><use href="#i-chick"/></svg>
        <h2>All done for today!</h2>
        <p>Next card due in ${relShort(next.dueAt)}</p>
        <button class="btn btn-secondary btn-block" id="reviewAnyway">Review anyway</button>
      </div>
      ${lastLine}`;
    $("#reviewAnyway").addEventListener("click", () => {
      // client-side: sort full list by dueAt asc, take the soonest 12
      startSession([...state.cards].sort((a, b) => a.dueAt - b.dueAt).slice(0, 12));
      navigate("#/review/session");
    });
    return;
  }

  main.innerHTML = `
    <div class="hero-card">
      <svg class="mascot"><use href="#i-chick"/></svg>
      <h2>Ready to review?</h2>
      <p>${due.length} card${due.length === 1 ? "" : "s"} due</p>
      <button class="btn btn-primary btn-block" id="startReview">Start review</button>
    </div>
    ${lastLine}`;
  $("#startReview").addEventListener("click", () => {
    startSession(defaultQueue());
    navigate("#/review/session");
  });
}

function defaultQueue() {
  return dueCards().sort((a, b) => a.dueAt - b.dueAt);
}

/* ============================================================
   Cards tab
   ============================================================ */
let searchQuery = "";

function renderCardsTab() {
  $("#shellTitle").textContent = "Cards";
  renderPoints(false);
  const main = $("#shellMain");

  if (state.cards.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <svg class="mascot"><use href="#i-chick"/></svg>
        <p>No cards yet — add your first word!</p>
        <button class="btn btn-primary" onclick="openEditor(null)">+ Add a card</button>
      </div>`;
    return;
  }

  main.innerHTML = `
    <div class="search-row">
      <input type="search" id="cardSearch" placeholder="Search cards…" aria-label="Search cards" value="${searchQuery.replace(/"/g, "&quot;")}" />
    </div>
    <div class="cards-count" id="cardsCount"></div>
    <div id="cardList"></div>`;
  $("#cardSearch").addEventListener("input", (e) => {
    searchQuery = e.target.value;
    renderCardList();
  });
  renderCardList();
}

function renderCardList() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = state.cards.filter(
    (c) => !q || c.front.toLowerCase().includes(q) || c.back.toLowerCase().includes(q)
  );
  $("#cardsCount").textContent = `${state.cards.length} card${state.cards.length === 1 ? "" : "s"}`;
  const list = $("#cardList");

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <p>No cards match “${searchQuery.trim()}”</p>
        <button class="btn btn-secondary" id="clearSearch">Clear search</button>
      </div>`;
    $("#clearSearch").addEventListener("click", () => {
      searchQuery = "";
      renderCardsTab();
    });
    return;
  }

  list.innerHTML = "";
  for (const card of filtered) {
    const status = cardStatus(card);
    const row = document.createElement("button");
    row.className = "card-row";
    row.innerHTML = `
      <div class="row-text">
        <div class="row-front"></div>
        <div class="row-back"></div>
      </div>
      <span class="chip ${status.cls}">${status.label}</span>`;
    row.querySelector(".row-front").textContent = card.front;
    row.querySelector(".row-back").textContent = card.back;
    row.addEventListener("click", () => navigate("#/cards/" + card.id));
    list.appendChild(row);
  }
}

/* ============================================================

/* ============================================================
   Review session
   ============================================================ */
const session = {
  queue: [],
  index: 0,
  results: [],       // { cardId, grade }
  pointsEarned: 0,
  phase: "front",    // front | flipping | back | graded
  redoRound: false,
};

function startSession(queue) {
  session.queue = queue;
  session.index = 0;
  session.results = [];
  session.pointsEarned = 0;
  session.phase = "front";
  session.redoRound = false;
}

function currentCard() { return session.queue[session.index]; }

function renderSession(entryAnimation) {
  $("#summaryWrap").hidden = true;
  $("#sessionStage").style.display = "flex";
  renderPoints(false);

  const card = currentCard();
  $("#progressLabel").textContent = `${session.index + 1} / ${session.queue.length}`;
  $("#progressFill").style.width = (session.index / session.queue.length) * 100 + "%";

  const area = $("#cardArea");
  area.innerHTML = `
    <div class="flashcard" id="flashcard">
      <div class="flashcard-inner">
        <div class="card-face front">
          <div class="card-content"></div>
        </div>
        <div class="card-face back">
          <div class="mini-front"></div>
          <div class="card-content"></div>
        </div>
      </div>
    </div>`;
  const fc = $("#flashcard");
  fc.querySelector(".front .card-content").textContent = card.front;
  fc.querySelector(".back .card-content").textContent = card.back;
  fc.querySelector(".mini-front").textContent = card.front;
  sizeCardContent(fc.querySelector(".front .card-content"), card.front);
  sizeCardContent(fc.querySelector(".back .card-content"), card.back);

  if (entryAnimation && !reducedMotion.matches) fc.classList.add("slide-in-right");

  session.phase = "front";
  renderSessionControls();
}

function sizeCardContent(el, text) {
  const len = text.length;
  let px = 32;
  if (len > 60) px = Math.max(20, Math.round(32 - ((len - 60) * 12) / 220));
  el.style.fontSize = px + "px";
  if (len > 280) el.classList.add("scrollable");
}

function renderSessionControls() {
  const controls = $("#sessionControls");
  if (session.phase === "front") {
    controls.innerHTML = `<button class="btn btn-primary btn-block show-answer-btn" id="showAnswer">Show answer</button>`;
    $("#showAnswer").addEventListener("click", flipCard);
  } else if (session.phase === "back") {
    controls.innerHTML = `
      <button class="ask-ai-btn" id="askAiSession"><svg class="icon"><use href="#i-sparkle"/></svg>Ask Khunpap</button>
      <div class="grade-row ${reducedMotion.matches ? "" : "slide-up"}">
        <button class="btn btn-forgot" data-grade="forgot">Forgot</button>
        <button class="btn btn-almost" data-grade="almost">Almost</button>
        <button class="btn btn-knew" data-grade="knew_it">Knew it</button>
      </div>`;
    $("#askAiSession").addEventListener("click", () => openChat(currentCard()));
    for (const b of controls.querySelectorAll("[data-grade]")) {
      b.addEventListener("click", (e) => gradeCard(e.currentTarget.dataset.grade, e.currentTarget));
    }
  } else {
    controls.innerHTML = "";
  }
}

function flipCard() {
  if (session.phase !== "front") return;
  session.phase = "flipping";
  const fc = $("#flashcard");
  fc.style.pointerEvents = "none"; // taps ignored during flip
  fc.classList.add("flipped");
  const flipMs = reducedMotion.matches ? 0 : 400;
  setTimeout(() => {
    session.phase = "back";
    fc.style.pointerEvents = "";
    renderSessionControls();
    announce("Answer: " + currentCard().back);
  }, flipMs);
}

function gradeCard(grade, buttonEl) {
  if (session.phase !== "back") return;
  session.phase = "graded";
  const card = currentCard();
  const points = pointsByGrade[grade];

  // committed immediately and optimistically
  const newBox = calculateNextBox(card.box, grade);
  card.box = newBox;
  card.lastReviewedAt = now();
  card.dueAt = now() + boxIntervalsDays[newBox] * dayMs;
  session.results.push({ cardId: card.id, grade });
  session.pointsEarned += points;
  const prevTotal = state.points;
  state.points += points;
  state.reviewsThisWeek += 1;

  renderSessionControls(); // clear grade row

  // feedback: fly-off + points chip arc + next-review flash + undo toast
  const fc = $("#flashcard");
  const flyClass = grade === "knew_it" ? "fly-knew" : grade === "almost" ? "fly-almost" : "fly-forgot";
  const flyMs = grade === "knew_it" ? 600 : 500;
  if (!reducedMotion.matches) fc.classList.add(flyClass);

  animatePointsChip(points, buttonEl);
  countUpPoints(prevTotal, state.points);
  announce(`${gradeLabels[grade]}. Plus ${points} points, total ${state.points}`);

  const flash = $("#nextReviewFlash");
  const days = boxIntervalsDays[newBox];
  flash.textContent = days === 1 ? "See you tomorrow" : `See you in ${days} days`;
  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  renderDueBadge();

  setTimeout(() => advance(), reducedMotion.matches ? 150 : flyMs + 80);
}

function advance() {
  if (session.phase !== "graded") return;
  if (session.index + 1 < session.queue.length) {
    session.index += 1;
    renderSession(true);
  } else {
    showSummary();
  }
}

function animatePointsChip(points, fromEl) {
  if (reducedMotion.matches || !fromEl) return;
  const chip = document.createElement("div");
  chip.className = "points-chip";
  chip.textContent = "+" + points;
  document.body.appendChild(chip);
  const from = fromEl.getBoundingClientRect();
  const to = $("#sessionPoints").getBoundingClientRect();
  const sx = from.left + from.width / 2 - 20;
  const sy = from.top - 8;
  const ex = to.left + to.width / 2 - 20;
  const ey = to.top + to.height / 2 - 14;
  const mx = (sx + ex) / 2 + 40;
  const my = Math.min(sy, ey) - 120; // arc peak
  chip.animate(
    [
      { transform: `translate(${sx}px, ${sy}px) scale(0.6)`, opacity: 1 },
      { transform: `translate(${mx}px, ${my}px) scale(1.15)`, opacity: 1, offset: 0.55 },
      { transform: `translate(${ex}px, ${ey}px) scale(0.5)`, opacity: 0.1 },
    ],
    { duration: 800, easing: "cubic-bezier(0.3, 0.7, 0.4, 1)" }
  ).onfinish = () => chip.remove();
}

/* ---------- Session summary ---------- */
function showSummary() {
  session.phase = "summary";
  $("#sessionStage").style.display = "none";
  $("#progressFill").style.width = "100%";
  $("#progressLabel").textContent = `${session.queue.length} / ${session.queue.length}`;

  const counts = { forgot: 0, almost: 0, knew_it: 0 };
  for (const r of session.results) counts[r.grade] += 1;
  const forgotten = session.results.filter((r) => r.grade === "forgot");

  const wrap = $("#summaryWrap");
  wrap.hidden = false;
  wrap.innerHTML = `
    <h2>Nice one, Khanh!</h2>
    <div class="summary-breakdown">
      <div class="stat-row"><span><span class="grade-dot" style="background:var(--color-success)"></span>Knew it</span><span class="stat-value">${counts.knew_it}</span></div>
      <div class="stat-row"><span><span class="grade-dot" style="background:var(--color-warning)"></span>Almost</span><span class="stat-value">${counts.almost}</span></div>
      <div class="stat-row"><span><span class="grade-dot" style="background:#8CA3B0"></span>Forgot</span><span class="stat-value">${counts.forgot}</span></div>
    </div>
    <div class="summary-points" id="summaryPoints">+${session.pointsEarned} points</div>
    <button class="btn btn-primary btn-block" id="summaryDone">Done</button>
    ${forgotten.length ? `<button class="btn btn-secondary btn-block" id="redoTricky">Redo the tricky ones</button>` : ""}`;

  burstConfetti();
  starBurst($("#summaryPoints"));
  announce(`Session done. ${session.pointsEarned} points earned.`);

  $("#summaryDone").addEventListener("click", () => {
    state.lastSession = {
      reviewed: session.results.length,
      knew: counts.knew_it + counts.almost,
    };
    navigate("#/review");
  });
  if (forgotten.length) {
    $("#redoTricky").addEventListener("click", () => {
      const redoQueue = forgotten
        .map((r) => state.cards.find((c) => c.id === r.cardId))
        .filter(Boolean);
      session.queue = redoQueue;
      session.index = 0;
      session.results = [];
      session.phase = "front";
      session.redoRound = true;
      renderSession(true);
    });
  }
}

function burstConfetti() {
  if (reducedMotion.matches) return;
  const layer = $("#confettiLayer");
  const colors = ["#ADD8E6", "#2FBF71", "#FFB020", "#F4536E", "#1D3A4A"];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[i % colors.length];
    p.style.setProperty("--dur", 0.8 + Math.random() * 0.4 + "s");
    p.style.setProperty("--spin", Math.round(Math.random() * 720 - 360) + "deg");
    p.style.animationDelay = Math.random() * 0.2 + "s";
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function starBurst(anchor) {
  if (reducedMotion.matches || !anchor) return;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement("span");
    s.className = "star-particle";
    s.textContent = "★";
    s.style.color = i % 2 ? "#FFB020" : "#ADD8E6";
    const angle = (i / 8) * Math.PI * 2;
    s.style.setProperty("--dx", Math.round(Math.cos(angle) * 70) + "px");
    s.style.setProperty("--dy", Math.round(Math.sin(angle) * 50) + "px");
    anchor.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

$("#sessionClose").addEventListener("click", () => navigate("#/review"));

   Card detail sheet

let editingCard = null;

function openEditor(card) {
  editingCard = card;
  $("#editorTitle").textContent = card ? "Edit card" : "New card";
  $("#editorFront").value = card ? card.front : "";
  $("#editorBack").value = card ? card.back : "";

function updateEditorSave() {
  $("#editorSave").disabled =
    !$("#editorFront").value.trim() || !$("#editorBack").value.trim();
}
$("#editorFront").addEventListener("input", updateEditorSave);
$("#editorBack").addEventListener("input", updateEditorSave);

$("#editorCancel").addEventListener("click", () => $("#sheetEditor").close());

$("#editorSave").addEventListener("click", () => {

    editingCard.back = back;

    state.cards.push({
      id: "c" + (++cardSeq),
      front, back,
      box: 0,
      dueAt: now(), // new cards are due immediately
      lastReviewedAt: null,
    });

  $("#sheetEditor").close();
  renderDueBadge();
  if (state.activeTab === "cards") renderCardsTab();

$("#editorDelete").addEventListener("click", () => {

/* ============================================================
   AI chat sheet (canned, fake-streamed)
   ============================================================ */
let chatCard = null;
let chatStreaming = false;

function openChat(card) {
  chatCard = card;
  chatStreaming = false;
  $("#chatMessages").innerHTML = "";
  $("#chatInput").value = "";
  renderChatChips(true);
  $("#sheetChat").showModal();
  addBubble(
    "assistant",
    `Hi Khanh! I'm Khunpap. We're looking at "${card.front}" — what would you like to know about it?`
  );
}

function renderChatChips(show) {
  const row = $("#chatChips");
  row.innerHTML = "";
  if (!show) return;
  const chips = [
    ["hint", "Give me a hint"],
    ["example", "Example sentence"],
    ["trick", "Memory trick"],
  ];
  for (const [kind, label] of chips) {
    const b = document.createElement("button");
    b.className = "suggestion-chip";
    b.textContent = label;
    b.addEventListener("click", () => sendChat(label, kind));
    row.appendChild(b);
  }
}

function addBubble(role, text) {
  const el = document.createElement("div");
  el.className = "bubble " + role;
  el.textContent = text;
  $("#chatMessages").appendChild(el);
  el.scrollIntoView({ block: "end", behavior: reducedMotion.matches ? "auto" : "smooth" });
  return el;
}

function tutorReply(card, kind) {
  const { front, back } = card;
  switch (kind) {
    case "hint":
      return `Here's a hint 💡 — the answer starts with “${back[0]}” and has ${back.length} characters. Think about where you'd meet “${front}” in everyday life!`;
    case "example":
      return `Let's use it! 📖 For example: „Ich sehe ${front} jeden Tag.“ — try saying the whole sentence out loud, then swap in the Vietnamese meaning: ${back}.`;
    case "trick":
      return `Memory trick 🧠 — link how “${front}” sounds with what “${back}” means. Picture a silly, vivid scene combining both. The sillier the image, the stickier the memory!`;
    default:
      return `Good question! Remember: “${front}” means “${back}”. Try covering the answer and recalling it once more before you grade yourself — active recall is what makes it stick. 💪`;
  }
}

function sendChat(text, kind) {
  if (chatStreaming || !text.trim()) return;
  addBubble("user", text);
  renderChatChips(false);
  chatStreaming = true;
  $("#chatInput").disabled = true;
  $("#chatSend").disabled = true;

  // typing indicator, then token-by-token fake streaming
  const typing = document.createElement("div");
  typing.className = "bubble assistant";
  typing.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>`;
  $("#chatMessages").appendChild(typing);
  typing.scrollIntoView({ block: "end" });

  const reply = tutorReply(chatCard, kind);
  const tokens = reply.split(/(?<=\s)/);
  const delay = reducedMotion.matches ? 0 : 600;

  setTimeout(() => {
    typing.remove();
    const bubble = addBubble("assistant", "");
    let i = 0;
    const interval = setInterval(() => {
      bubble.textContent += tokens[i++];
      bubble.scrollIntoView({ block: "end" });
      if (i >= tokens.length) {
        clearInterval(interval);
        chatStreaming = false;
        $("#chatInput").disabled = false;
        $("#chatSend").disabled = false;
        $("#chatInput").focus();
      }
    }, reducedMotion.matches ? 1 : 35);
  }, delay);
}

$("#chatForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const text = $("#chatInput").value;
  if (!text.trim()) return;
  $("#chatInput").value = "";
  sendChat(text, "free");
});

/* ============================================================
   Sheets: shared close / light-dismiss fallback / drag-down
   ============================================================ */
const allSheets = [$("#sheetDetail"), $("#sheetEditor"), $("#sheetChat")];

function closeAllSheets() {
  for (const d of allSheets) if (d.open) d.close();
}

for (const dialog of allSheets) {
  const closeBtn = dialog.querySelector("[data-close-sheet]");
  if (closeBtn) closeBtn.addEventListener("click", () => dialog.close());

  // light-dismiss fallback for browsers without <dialog closedby>
  if (!("closedBy" in HTMLDialogElement.prototype)) {
    dialog.addEventListener("click", (event) => {
      if (event.target !== dialog) return;
      const rect = dialog.getBoundingClientRect();
      const inside =
        rect.top <= event.clientY && event.clientY <= rect.top + rect.height &&
        rect.left <= event.clientX && event.clientX <= rect.left + rect.width;
      if (!inside) dialog.close();
    });
  }

  // drag-down on the handle to close
  const handle = dialog.querySelector("[data-drag-close]");
  if (handle) {
    let startY = null;
    handle.addEventListener("pointerdown", (e) => {
      startY = e.clientY;
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener("pointermove", (e) => {
      if (startY == null) return;
      const dy = Math.max(0, e.clientY - startY);
      dialog.style.transform = `translateY(${dy}px)`;
    });
    handle.addEventListener("pointerup", (e) => {
      if (startY == null) return;
      const dy = e.clientY - startY;
      dialog.style.transform = "";
      startY = null;
      if (dy > 90) dialog.close();
    });
  }
}

/* ============================================================
   Login
   ============================================================ */
$("#loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const input = $("#loginPassword");
  const value = input.value;
  // prototype rule: empty or the literal "wrong" fails; anything else works
  if (!value || value === "wrong") {
    $("#loginError").textContent = "Hmm, that's not it — try again.";
    input.classList.remove("shake");
    void input.offsetWidth;
    input.classList.add("shake");
    input.focus();
    return;
  }
  $("#loginError").textContent = "";
  state.loggedIn = true;
  const shell = $("#appShell");
  shell.classList.remove("scale-in");
  void shell.offsetWidth;
  shell.classList.add("scale-in");
  navigate("#/review");
});
