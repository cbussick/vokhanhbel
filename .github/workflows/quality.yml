name: Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vokhanhbel_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d vokhanhbel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/vokhanhbel_test
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@127.0.0.1:5433/vokhanhbel_test
      APP_PASSWORD_HASH: test-only
      OPENAI_API_KEY: test-only
      OPENAI_MODEL: gpt-5.6-luna
      RATE_LIMIT_HMAC_SECRET: test-only-secret-that-is-at-least-32-characters
      APP_ORIGIN: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:db
      - run: npm run build
      - run: npm run test:e2e
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run licenses
